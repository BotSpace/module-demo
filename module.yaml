# module.yaml — universal Botmother module descriptor (repo root)
# Module Manager shu faylni o'qib modulni build+run qiladi.
apiVersion: botmother.module/v1

module:
  id: demo                      # global unique slug; node turlari shu bilan namespace qilinadi (demo.Echo)
  name: Demo Module
  version: 0.1.0
  description: Reference module — Echo, Upper, AuthHeader (credential), SetVariable, OnKeyword (trigger). JSON-RPC 2.0 kontrakt namunasi.
  author: botmother
  icon: sparkles                # lucide icon name (constructor iconName fallback)

# Modul manbasi — IKKISIDAN BITTASI:
#   source.github   → platforma kodni klonlab image quradi (platforma-hosted)
#   source.endpoint → modul allaqachon shu manzilda ishlaydi (self-hosted), build yo'q
source:
  github: https://github.com/BotSpace/module-demo
  # endpoint: https://my-server.com/rpc

runtime:
  dockerfile: Dockerfile        # repo'da Dockerfile bor → image shundan build qilinadi
  port: 8100                    # modul JSON-RPC HTTP serveri shu portda
  healthcheck: /health          # GET, 200 kutiladi
  env:
    - LOG_LEVEL=info

# NOTE: contract/provides/resources — tavsifiy (platforma faqat module/source/runtime'ni o'qiydi).
contract:
  jsonrpc: "2.0"
  endpoint: /rpc                # bitta JSON-RPC endpoint (POST)
  methods: [describe, node.execute, trigger.match, docs]   # to'liq kontrakt
  push_trigger: false           # demo event-match trigger ishlatadi (trigger.match), push emas

resources:
  cpu: "250m"
  memory: "128Mi"

# Modul beradigan node turlari (describe() bilan mos bo'lishi shart — tez routing uchun).
provides:
  nodes:
    - type: demo.Echo
      trigger: false
    - type: demo.Upper
      trigger: false
    - type: demo.AuthHeader       # credential field ishlatadi
      trigger: false
    - type: demo.SetVariable      # dinamik state yozadi
      trigger: false
    - type: demo.OnKeyword        # event-match trigger
      trigger: true
