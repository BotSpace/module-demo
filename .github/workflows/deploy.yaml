name: Build & Push Module Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Private Registry
        uses: docker/login-action@v3
        with:
          registry: registry.iprogrammer.uz
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            registry.iprogrammer.uz/botspace/module-demo:${{ env.SHORT_SHA }}
            registry.iprogrammer.uz/botspace/module-demo:latest

      # Auto-deploy: tell the backend to restart the shared module pod (re-pulls
      # :latest) and refresh the manifest. Slug is read from module.yaml so this
      # step is identical for every module repo.
      - name: Trigger backend redeploy
        env:
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
        run: |
          SLUG=$(grep -E '^[[:space:]]*id:' module.yaml | head -1 | awk '{print $2}')
          BASE="${BACKEND_API_URL:-https://api.botspace.uz}"
          echo "Redeploying module '$SLUG' via $BASE"
          curl -fsS -X POST \
            -H "X-Internal-Token: $INTERNAL_API_TOKEN" \
            "$BASE/api/modules/$SLUG/redeploy/" \
            && echo "redeploy triggered" \
            || echo "redeploy trigger failed (non-fatal — image is pushed; TTL refresh will catch up)"
